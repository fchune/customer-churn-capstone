<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customer Churn Predictor</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="container">
    <h1>Customer Churn Predictor</h1>
    <p class="subtitle">Enter customer details to predict churn risk</p>

    <form action="/predict" method="POST">

      <div class="section-title">Account Information</div>

      <div class="form-group">
        <label for="tenure">Tenure (months)</label>
        <input type="number" id="tenure" name="tenure" min="0" max="72" required placeholder="e.g. 12" />
      </div>

      <div class="form-group">
        <label for="monthly_charges">Monthly Charges ($)</label>
        <input type="number" id="monthly_charges" name="monthly_charges" step="0.01" min="0" required placeholder="e.g. 65.00" />
      </div>

      <div class="form-group">
        <label for="total_charges">Total Charges ($)</label>
        <input type="number" id="total_charges" name="total_charges" step="0.01" min="0" required placeholder="e.g. 780.00" />
      </div>

      <div class="form-group">
        <label for="contract">Contract Type</label>
        <select id="contract" name="contract" required>
          <option value="">-- Select --</option>
          <option value="Month-to-month">Month-to-month</option>
          <option value="One year">One year</option>
          <option value="Two year">Two year</option>
        </select>
      </div>

      <div class="form-group">
        <label for="internet_service">Internet Service</label>
        <select id="internet_service" name="internet_service" required>
          <option value="">-- Select --</option>
          <option value="Fiber optic">Fiber optic</option>
          <option value="DSL">DSL</option>
          <option value="No">No internet service</option>
        </select>
      </div>

      <div class="form-group">
        <label for="payment_method">Payment Method</label>
        <select id="payment_method" name="payment_method" required>
          <option value="">-- Select --</option>
          <option value="Electronic check">Electronic check</option>
          <option value="Mailed check">Mailed check</option>
          <option value="Bank transfer (automatic)">Bank transfer (automatic)</option>
          <option value="Credit card (automatic)">Credit card (automatic)</option>
        </select>
      </div>

      <div class="section-title">Customer Profile</div>

      <div class="checkbox-group">
        <label><input type="checkbox" name="senior_citizen" value="1" /> Senior Citizen</label>
        <label><input type="checkbox" name="dependents" value="1" /> Has Dependents</label>
        <label><input type="checkbox" name="paperless_billing" value="1" /> Paperless Billing</label>
        <label><input type="checkbox" name="tech_support" value="1" /> Tech Support</label>
        <label><input type="checkbox" name="online_backup" value="1" /> Online Backup</label>
      </div>

      <button type="submit" class="btn">Predict Churn Risk</button>
    </form>
  </div>
</body>
</html>
